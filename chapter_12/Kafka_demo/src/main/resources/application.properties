server.port=8080
# ==================== Kafka \u57FA\u7840\u914D\u7F6E ====================
# Kafka \u96C6\u7FA4\u5730\u5740\uFF0C\u591A\u4E2A\u7528\u9017\u53F7\u5206\u9694
spring.kafka.bootstrap-servers=192.168.239.137:9092

# ==================== Producer \u751F\u4EA7\u8005\u914D\u7F6E ====================
# Key \u7684\u5E8F\u5217\u5316\u65B9\u5F0F
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
# Value \u7684\u5E8F\u5217\u5316\u65B9\u5F0F
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
# \u53D1\u9001\u5931\u8D25\u540E\u7684\u91CD\u8BD5\u6B21\u6570
spring.kafka.producer.retries=3
# acks \u786E\u8BA4\u673A\u5236\uFF1A
#   0 = \u4E0D\u7B49\u5F85\u4EFB\u4F55\u786E\u8BA4\uFF0C\u53D1\u9001\u5373\u8FD4\u56DE
#   1 = Leader \u526F\u672C\u5199\u5165\u6210\u529F\u5373\u8FD4\u56DE\uFF0C\u4E0D\u7B49 Follower \u540C\u6B65
#   all / -1 = \u6240\u6709 ISR \u4E2D\u7684\u526F\u672C\u90FD\u5199\u5165\u6210\u529F\u624D\u8FD4\u56DE
spring.kafka.producer.acks=1

# ==================== Consumer \u6D88\u8D39\u8005\u914D\u7F6E ====================
# \u6D88\u8D39\u8005\u6240\u5C5E\u7684 Consumer Group
# \u540C\u4E00\u4E2A group \u5185\uFF0C\u4E00\u4E2A\u5206\u533A\u53EA\u4F1A\u5206\u7ED9\u4E00\u4E2A\u6D88\u8D39\u8005\u5B9E\u4F8B
spring.kafka.consumer.group-id=my-group
# offset \u91CD\u7F6E\u7B56\u7565\uFF1A
#   earliest = \u4ECE\u6700\u65E9\u7684\u6D88\u606F\u5F00\u59CB\u6D88\u8D39\uFF08\u5206\u533A\u7684\u8D77\u59CB\u4F4D\u7F6E\uFF09
#   latest = \u4ECE\u6700\u65B0\u7684\u6D88\u606F\u5F00\u59CB\u6D88\u8D39\uFF08\u53EA\u6D88\u8D39\u542F\u52A8\u4E4B\u540E\u4EA7\u751F\u7684\u65B0\u6D88\u606F\uFF09
#   none = \u5982\u679C\u6CA1\u6709\u5DF2\u63D0\u4EA4\u7684 offset\uFF0C\u76F4\u63A5\u629B\u5F02\u5E38
spring.kafka.consumer.auto-offset-reset=latest
# \u5173\u95ED\u81EA\u52A8\u63D0\u4EA4 offset\uFF0C\u6539\u4E3A\u4EE3\u7801\u4E2D\u624B\u52A8\u786E\u8BA4
spring.kafka.consumer.enable-auto-commit=false
# Key \u7684\u53CD\u5E8F\u5217\u5316\u65B9\u5F0F
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
# Value \u7684\u53CD\u5E8F\u5217\u5316\u65B9\u5F0F
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# ==================== Listener \u76D1\u542C\u5668\u914D\u7F6E ====================
# \u624B\u52A8\u7ACB\u5373\u786E\u8BA4\u6A21\u5F0F\uFF0C\u914D\u5408 @KafkaListener \u4E2D\u7684 Acknowledgment.acknowledge() \u4F7F\u7528
spring.kafka.listener.ack-mode=manual_immediate