<html xmlns:th="http://www.thymeleaf.org">
<body>
<table border="1">
<tr>
    <td>图书编号</td>
    <td>图书名称</td>
    <td>图书作者</td>
</tr>
    <tr th:each ="book:${books}">
        <td th:text="${book.id}"></td>
        <td th:text="${book.name}"></td>
        <td th:text="${book.author}"></td>
    </tr>
</table>
</body>
</html>
